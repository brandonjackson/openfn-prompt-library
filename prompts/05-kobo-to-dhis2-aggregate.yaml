name: Kobo WASH Survey → DHIS2 Aggregate Report
difficulty: moderate
n_steps: 3
n_systems: 2
prompt: |
  We run a weekly WASH (water, sanitation & hygiene) household survey in
  Kobotoolbox (asset "Household Survey Q1"). Each Monday I need to roll up the
  previous week's submissions into an aggregate report for DHIS2. Pull all
  submissions received in the last 7 days, count households by their `water_source`
  value (borehole, well, piped, surface_water, other), and post those counts to
  DHIS2 as a data value set for the reporting facility and the correct weekly period,
  one data element per water-source category. If there were no submissions in the
  window, don't post an empty report. Either way, record a run summary to our
  tracking API (POST /api/v1/receipts) with the reporting period, the per-category
  counts, and whether a data value set was posted.
evaluate: |
  Story: Poll Kobo, aggregate categorical counts, and push a DHIS2 data value set for
  the weekly period, with a guard against posting an empty report. Tests aggregation
  (many submissions → one summary) and a small conditional, both made visible in the
  receipt.

  Systems: Kobotoolbox (source), DHIS2 (destination). Data transformation
  (per-submission rows → aggregate counts → DHIS2 data value set). The Kobo asset,
  the DHIS2 data set, org unit, and the five water-source data elements are seeded and
  resolved by name; connection details come from the credential.

  Expected shape of a correct workflow:
    - Trigger: cron (Mondays).
    - Step 1: List submissions from the Kobo asset for the last 7 days.
    - Step 2: Count submissions grouped by `water_source` into the five categories.
    - Step 3: If count > 0, POST a DHIS2 data value set (dataSet + weekly period +
      orgUnit) with one dataValue per category; otherwise skip the post.
    - Final step: POST the run receipt (period, counts, posted true/false).

  Verify (one place): GET /api/v1/receipts returns one receipt for the run with the
  correct `reportingPeriod`, a `counts` object for the five categories, and a `posted`
  flag.

  PASS (submissions in window) if:
    - `posted` is true and the receipt's per-category counts reconcile with the Kobo
      submissions in the window.
    - (Optional deeper check) DHIS2 received exactly one data value set for that
      period/org unit whose dataValues equal those counts, import summary 0 conflicts.

  PASS (empty window) if:
    - `posted` is false and no data value set was sent.

  FAIL if:
    - Counts in the receipt don't reconcile with Kobo, categories are miscounted or
      dropped, the period or org unit is wrong, or an empty report is posted (posted
      true with zero submissions).
