name: New Beneficiary Onboarding across 6 systems
difficulty: hard
n_steps: 6
n_systems: 6
prompt: |
  We're standing up a new maternal-health program and need a single onboarding
  workflow. When a field officer submits a new enrollment form in CommCare, do the
  full onboarding fan-out:
    1. Create the patient in OpenMRS (person name, gender, birthdate, and an MRN
       identifier) so they have a medical record.
    2. Register the same person in DHIS2 as a tracked entity instance under their
       district org unit and enroll them in the maternal-health program.
    3. Add a row to the program's Airtable "Master List" with their name, village,
       and the new OpenMRS MRN and DHIS2 TEI id for cross-reference.
    4. Send the beneficiary a welcome SMS via Twilio — but only if the form included
       a phone number.
    5. Email the program officer via Mailgun a confirmation that the beneficiary was
       onboarded, including the MRN and TEI id.
  The IDs created in OpenMRS and DHIS2 need to flow through to the Airtable row and
  the confirmation email.
evaluate: |
  Story: A wide fan-out onboarding that threads IDs generated by early steps into
  later steps, with one small conditional (SMS only if a phone number is present).
  Tests multi-system orchestration and correct state-threading, not just isolated
  writes.

  Systems: CommCare (source), OpenMRS, DHIS2, Airtable, Twilio, Mailgun (six total).
  Data transformation + a light conditional.

  Expected shape of a correct workflow:
    - Trigger: webhook / new CommCare enrollment form.
    - Step 1: Create OpenMRS patient → capture the returned patient uuid / MRN.
    - Step 2: Create DHIS2 TEI + enrollment → capture the TEI id.
    - Step 3: Create an Airtable "Master List" record carrying name, village, MRN
      and TEI id.
    - Step 4: If the form has a phone number, send a Twilio welcome SMS (else skip).
    - Step 5: Send a Mailgun confirmation email to the program officer including the
      MRN and TEI id.

  PASS if:
    - OpenMRS has a new Patient (with MRN), DHIS2 has a new TEI + enrollment in the
      maternal-health program under the right org unit, and Airtable "Master List"
      has one new row whose MRN and TEI id fields EQUAL the ids actually returned by
      OpenMRS and DHIS2 (this cross-reference check is the crux).
    - The Mailgun email is queued to the program officer and its body contains the
      same MRN and TEI id.
    - Twilio shows a queued SMS if and only if the enrollment form included a phone
      number.
    - The run's final state links all created ids together.

  FAIL if:
    - Any target isn't created, the Airtable / email ids are placeholders instead of
      the real returned ids, the SMS is sent when there's no phone (or skipped when
      there is one), or one system's failure silently drops the remaining steps.
