name: New Beneficiary Onboarding across 6 systems
difficulty: hard
n_steps: 6
n_systems: 6
prompt: |
  We're standing up a new maternal-health program and need a single onboarding
  workflow. When a field officer submits a new enrollment form in CommCare, do the
  full onboarding fan-out:
    1. Create the patient in OpenMRS (person name, gender, birthdate, and an MRN
       identifier) so they have a medical record.
    2. Register the same person in DHIS2 as a tracked entity instance under their
       district org unit and enroll them in the maternal-health program.
    3. Add a row to the program's Airtable "Master List" with their name, village,
       and the new OpenMRS MRN and DHIS2 TEI id for cross-reference.
    4. Send the beneficiary a welcome SMS via Twilio — but only if the form included
       a phone number.
    5. Email the program officer (program-officer@example.org) via Mailgun a
       confirmation that the beneficiary was onboarded, including the MRN and TEI id.
  The IDs created in OpenMRS and DHIS2 need to flow through to the Airtable row and
  the confirmation email. Finish by recording a run summary to our tracking API
  (POST /api/v1/receipts) with the CommCare form id, the OpenMRS uuid + MRN, the DHIS2
  TEI id, the Airtable row id, the confirmation email id, and the SMS sid if one was
  sent.
evaluate: |
  Story: A wide fan-out onboarding that threads ids generated by early steps into
  later steps, with one small conditional (SMS only if a phone is present). Tests
  multi-system orchestration and correct state-threading, proven by a receipt whose
  ids must line up across systems.

  Systems: CommCare (source), OpenMRS, DHIS2, Airtable, Twilio, Mailgun (six). Data
  transformation + a light conditional. The maternal-health program, district org
  units, and the Airtable "Master List" are seeded; the program-officer address is
  given; connections via credentials.

  Expected shape of a correct workflow:
    - Trigger: webhook / new CommCare enrollment form.
    - Step 1: Create OpenMRS patient → capture uuid / MRN.
    - Step 2: Create DHIS2 TEI + enrollment → capture the TEI id.
    - Step 3: Create the Airtable "Master List" row carrying name, village, MRN, TEI id.
    - Step 4: If the form has a phone, send a Twilio welcome SMS (else skip).
    - Step 5: Mailgun confirmation to the program officer with MRN + TEI id.
    - Final step: POST the run receipt with all ids.

  Verify (one place): GET /api/v1/receipts returns one receipt in which
  `openmrsUuid`/`mrn`, `teiId`, `airtableRecordId`, and `emailId` are all non-empty,
  and `smsSid` is present iff the form had a phone.

  PASS if:
    - All of the above ids are present and real (not placeholders), and the receipt's
      MRN and TEI id are the SAME values written to the Airtable row and named in the
      confirmation email (the cross-reference is the crux).
    - `smsSid` present if and only if the enrollment form included a phone number.
    - (Optional deeper check) OpenMRS has the Patient (with MRN), DHIS2 the TEI +
      enrollment under the right org unit, Airtable "Master List" the row whose MRN/TEI
      fields equal the returned ids, and Mailgun the queued email containing them.

  FAIL if:
    - Any target isn't created; the Airtable/email/receipt ids are placeholders rather
      than the real returned ids; the ids don't line up across systems; the SMS is sent
      with no phone (or skipped when there was one); or one system's failure silently
      drops the rest.
