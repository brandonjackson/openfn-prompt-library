name: Humanitarian Protection Intake — full orchestration (7 systems, GBV branch)
difficulty: hard
n_steps: 8
n_systems: 7
prompt: |
  We're rolling out a protection intake process for a humanitarian response and need
  one end-to-end workflow that ties everything together.

  Intake happens in Kobotoolbox: field teams submit a "Protection Intake" survey
  (asset). For each new submission, do the following standard registration for every
  case, regardless of type:
    - Create or update a case in Primero from the submission (name, age, sex,
      protection concerns, registration date, owned_by = the submitting field
      worker).
    - Cross-register the individual in DHIS2 as a tracked entity instance under the
      site's org unit so they show up in aggregate protection statistics.
    - Store a copy of the intake in our Airtable "Intake Register" for the field
      coordinator.
    - Push a de-identified summary (no name, no exact location — just age band, sex,
      concern type, and site code) to our partner's reporting API over plain HTTP.

  Then branch on protection concern: if the submission is flagged as a
  gender-based-violence (GBV) case (concern includes "gbv" or "sexual_violence"),
  escalate — create an incident in Primero linked to the case, create a referral to
  the GBV response service, send an URGENT SMS via Twilio to the GBV focal point
  (+232 76 000 002), and email the protection coordinator (coordinator@example.org)
  via Mailgun with the case_id and site. If it is not a GBV case, the standard
  registration above is all that's needed — no incident, referral, SMS, or
  coordinator email.

  Everything should key off the same person, so the Primero case_id, DHIS2 TEI id,
  and Airtable record are cross-referenced. Finish by recording a run summary to our
  tracking API (POST /api/v1/receipts) with the branch taken ("gbv" or "standard"),
  the Primero case_id, DHIS2 TEI id, and Airtable row id from the standard path, and,
  for GBV cases, the incident id, referral id, SMS sid, and coordinator email id.
evaluate: |
  Story: The most complex scenario, a 7-system orchestration with a shared standard
  registration that runs for every case, a conditional GBV escalation branch, and a
  data-minimization transform for the partner API. Tests everything at once: fan-out,
  branching, transformation, PII handling, and cross-referencing, all summarized in
  one receipt.

  Systems: Kobotoolbox (source), Primero, DHIS2, Airtable, Generic HTTP (partner API),
  Twilio, Mailgun (seven). Transformation + branching. The Kobo "Protection Intake"
  asset, the Primero "GBV response service", DHIS2 site org units, and the Airtable
  "Intake Register" are seeded; the focal-point number and coordinator email are
  given; connections via credentials.

  Expected shape of a correct workflow:
    - Trigger: cron poll / webhook of new Kobo "Protection Intake" submissions.
    - Standard path (ALL cases): Primero case upsert → DHIS2 TEI → Airtable "Intake
      Register" row → HTTP POST of a DE-IDENTIFIED summary to the partner API.
    - GBV branch (concern includes gbv / sexual_violence): Primero incident (linked to
      the case) → Primero referral to the GBV service → urgent Twilio SMS to the focal
      point → Mailgun email to the coordinator.
    - Non-GBV: none of the four escalation steps.
    - Final step: POST the run receipt.

  Verify (one place): GET /api/v1/receipts returns one receipt per submission with
  `branch` ("gbv" | "standard") and the standard-path ids `primeroCaseId`, `teiId`,
  and `airtableRecordId`; GBV receipts additionally carry `incidentId`, `referralId`,
  `smsSid`, and `coordinatorEmailId`.

  PASS (every submission) if:
    - The three standard-path ids are present and cross-reference the same person, and
      the partner API received a record with ONLY de-identified fields (age band, sex,
      concern type, site code), no name and no precise location. (Check the partner
      payload once via GET /_admin/requests or the target collection; the receipt does
      not certify de-identification by itself.)

  PASS (GBV submission) if:
    - `branch` = "gbv" and `incidentId`, `referralId`, `smsSid`, and
      `coordinatorEmailId` are all present; deeper check: Primero has the incident + a
      referral to the GBV service, Twilio one urgent SMS to +232 76 000 002, Mailgun
      one email to coordinator@example.org with case_id + site.

  PASS (non-GBV submission) if:
    - `branch` = "standard" and none of the escalation ids are present; no incident,
      referral, SMS, or coordinator email exists.

  FAIL if:
    - The partner payload leaks PII (name / precise location); the GBV branch fires for
      non-GBV (or is skipped for GBV); the cross-reference ids don't line up; a
      standard-path record is missing; or the receipt's branch/ids don't match what was
      actually created.
