name: OpenMRS Encounters → FHIR HIE (nightly transaction bundle)
difficulty: hard
n_steps: 3
n_systems: 2
prompt: |
  Every night we need to push the day's clinical activity from our OpenMRS instance
  to the national Health Information Exchange, which is a FHIR R4 server. For each
  patient who had an encounter in OpenMRS in the last 24 hours, build the
  corresponding FHIR R4 resources: a Patient (mapped from the OpenMRS person, names,
  gender, birthdate, MRN identifier), an Encounter (mapped from the OpenMRS
  encounter), and an Observation for each OpenMRS obs (map the concept to a LOINC
  code where possible, carry the numeric value + unit). Assemble everything into a
  single FHIR transaction Bundle with internal references wired up (Encounter and
  Observation reference the Patient) and POST it to the HIE's base endpoint. Then
  record a run summary to our tracking API (POST /api/v1/receipts) with the counts of
  patients, encounters, and observations sent and the ids the HIE returned for each
  created resource.
evaluate: |
  Story: A non-trivial OpenMRS-REST → FHIR-R4 transformation, culminating in one
  transaction Bundle POST with correct internal references, summarized in a receipt.
  Tests deep, multi-entity data mapping between two clinical specs.

  Systems: OpenMRS (source), FHIR (destination). Heavy data transformation. The
  OpenMRS window data and the FHIR server are seeded/available; connection details
  come from credentials.

  Expected shape of a correct workflow:
    - Trigger: cron (nightly).
    - Step 1: Query OpenMRS for encounters in the last 24h (with patients and obs).
    - Step 2: Transform each into FHIR Patient / Encounter / Observation; assemble a
      "transaction" Bundle with cross-resource references (Encounter.subject →
      Patient, Observation.subject → Patient).
    - Step 3: POST the Bundle to the FHIR base (POST /).
    - Final step: POST the run receipt (counts + returned ids).

  Verify (one place): GET /api/v1/receipts returns one receipt with `patients`,
  `encounters`, and `observations` counts and the returned resource ids.

  PASS if:
    - The receipt's counts equal the OpenMRS encounters/obs in the window, and it lists
      a returned id for every resource (none missing or placeholder).
    - (Optional deeper check) The FHIR transaction-response Bundle had every
      entry.response.status in 200/201; GET /Patient|/Encounter|/Observation return
      resources matching the source (name, gender, birthDate, MRN; obs value + unit;
      LOINC coding) with every Encounter/Observation resolving to its Patient.

  FAIL if:
    - The receipt is missing or miscounted; references are broken or point at
      nonexistent ids; resources aren't valid FHIR R4; obs values/units are lost; the
      bundle isn't a transaction; or the window is wrong (not the last 24h).
