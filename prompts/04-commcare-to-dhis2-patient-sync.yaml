name: CommCare Pregnancy Registration → DHIS2 Tracker
difficulty: moderate
n_steps: 2
n_systems: 2
prompt: |
  Community health workers register pregnant women in CommCare using the
  `pregnancy` case type. Whenever a new pregnancy case is created, sync it to DHIS2
  as a tracked entity instance (tracked entity type "Person") under the facility org
  unit named in the case. Map the case properties to TEI attributes (first_name,
  last_name, age, phone, village), enroll the woman in the Antenatal Care program
  using the case's date_opened as the enrollment date, and record a registration
  event against the program's first stage. Finally, record a run summary to our
  tracking API (POST /api/v1/receipts) with the CommCare case_id and the DHIS2
  tracked-entity, enrollment, and event ids that were created.
evaluate: |
  Story: The classic CommCare → DHIS2 tracker sync, with field mapping plus an
  enrollment and event, not just a bare TEI. Tests whether the assistant knows the
  DHIS2 tracker data model (TEI → enrollment → event) and threads the created ids
  into a single verifiable receipt.

  Systems: CommCare (source), DHIS2 (destination). Data transformation (CommCare case
  properties → DHIS2 TEI attributes). The DHIS2 program, org units, tracked entity
  type "Person", and attributes are seeded in the mock and resolved by name at
  runtime; connection details come from the credential.

  Expected shape of a correct workflow:
    - Trigger: webhook (new CommCare case) or a poll of the case list.
    - Transform + load into DHIS2: build a TEI whose attributes map from the case
      `properties`, enroll in the Antenatal Care program with enrollmentDate =
      case.date_opened, and create one event on the first program stage, ideally via a
      tracker upsert so TEI, enrollment and event go together.
    - Final step: POST the run receipt with the created ids.

  Verify (one place): GET /api/v1/receipts returns one receipt for the case with
  non-empty `teiId`, `enrollmentId`, and `eventId`, `program` = Antenatal Care, and
  `orgUnit` = the facility named in the case.

  PASS if:
    - The receipt is present and all three ids are non-empty and distinct, tied to the
      correct program and org unit.
    - (Optional deeper check) The `teiId` resolves in DHIS2 to a TEI of type Person
      whose attributes match the case properties, with the enrollment and event
      attached, and the tracker import reported success with 0 conflicts.

  FAIL if:
    - No receipt is written; any of teiId/enrollmentId/eventId is missing or a
      placeholder; the org unit is wrong or hard-coded; or (on the deeper check) only a
      TEI exists with no enrollment/event, or attributes are blank/mismatched.
